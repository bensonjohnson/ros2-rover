bno085_imu_publisher:
  ros__parameters:
    # I2C Configuration
    i2c_bus: 5                   # same bus the LSM9DS1 used
    address: 0x4A                # 0x4B if the ADR jumper is closed
    frame_id: 'imu_link'

    # Sensor Configuration
    update_rate: 50.0            # Hz (chip fuses internally at 100+ Hz)

    # Mounting. Verify after installing the board:
    #   spin the rover CCW (from above) -> angular_velocity.z must be
    #   POSITIVE and the EKF yaw must increase. If z is negative with the
    #   board flat, set yaw_sign: -1.0; if the board is mounted component-
    #   side down, set upside_down: true.
    upside_down: false
    yaw_sign: 1.0

    # Fused game-rotation-vector orientation (magnetometer-free, gyro
    # auto-calibrated on chip). Once axes are verified, flip the EKF's
    # imu0_config yaw-orientation to true to fuse it as absolute heading.
    publish_orientation: true
