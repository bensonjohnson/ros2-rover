# RLPD style-learning reward channels (5-channel wire format).
#
# The 50/50 demo replay + critic ensemble in RLPD does the heavy lifting:
# the policy learns to mimic your teleop driving in demo-covered states and
# to avoid the human's `RB` corrections everywhere else. These five channels
# are the *shaping* on top of that imitation signal so the trained policy is
# smoother and more efficient than the human demos themselves.
#
# Channel order (must match REWARD_CHANNELS_RLPD on the server):
#   - smoothness   : -‖a_t − a_{t-1}‖²        action-jerk penalty
#   - progress     :  max(0, linear_vel)      forward-motion bonus
#   - turn_penalty : -|angular_vel|           discourage spin-in-place
#   - collision    : -1.0 per tick /emergency_stop is held (sticky)
#   - intervention : -1.0 per tick the human held RB (HIL-SERL)
#
# The trainer reads weights from CLI args (--w_smoothness, --w_progress,
# --w_turn, --w_collision, --w_intervention). The values below are the source
# of truth for the *rover-side clip bounds* and serve as documentation of the
# defaults the trainer ships with — keep them in sync with the trainer CLI.

weights:
  smoothness:   0.02   # small — don't dominate, just discourage jerk
  progress:     0.05   # small forward-motion pressure
  turn_penalty: 0.01   # very small; full turning is fine when it makes progress
  collision:    1.0    # channel is already -1, weight stays at 1
  intervention: 1.0    # channel is already -1, weight stays at 1

# Rover-side per-channel bounds applied BEFORE weighting. Tight clips on the
# shaping terms protect against reward-hacking (e.g. unbounded jerk penalty
# pushing the actor to never move).
clip:
  smoothness:   [-1.0, 0.0]
  progress:     [ 0.0, 0.5]
  turn_penalty: [-1.0, 0.0]
